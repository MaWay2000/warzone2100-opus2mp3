<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPUS to MP3 Converter</title>
  <meta name="description" content="Convert OPUS and MP3 audio directly in your browser." />
  <link rel="icon" href="data:,">
  <style>
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: #fff;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 24px calc(var(--status-space, 116px) + 24px);
    }
    .layout {
      width: min(1120px, 100%);
    }
    .card {
      width: 100%;
      background: #12131a;
      border: 1px solid #2a2d3a;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    h1 { margin: 0 0 12px; font-size: 42px; text-align: center; }
    p { color: #c8cbe0; }
    .intro-copy { text-align: center; }
    .mode-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .mode-btn {
      flex: 1 1 220px;
      min-width: 0;
    }
    .settings-grid {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .setting-field {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    .setting-label {
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .setting-select {
      width: 100%;
      flex: 1 1 auto;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #31364b;
      background: #1b1f30;
      color: #fff;
      font: inherit;
    }
    .dropzone {
      margin-top: 18px;
      border: 2px dashed #5968ff66;
      border-radius: 16px;
      padding: 22px;
      text-align: center;
      background: #0d1020;
    }
    .dropzone.drag { border-color: #7c8cff; background: #141935; }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 14px;
    }
    .btn, label.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      background: #8ea0ff;
      color: #0f1328;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition:
        background-color 220ms ease,
        border-color 220ms ease,
        color 220ms ease,
        box-shadow 220ms ease,
        opacity 180ms ease;
    }
    .btn.secondary {
      background: #1b1f30;
      color: #fff;
      border: 1px solid #31364b;
    }
    .mode-btn.active,
    .mode-btn.active.btn.secondary {
      background: #78c200;
      color: #102312;
      border-color: #8bd61e;
      box-shadow: 0 0 0 1px rgba(139, 214, 30, 0.24) inset;
    }
    .convert-ready,
    .convert-ready.btn.secondary {
      background: #78c200;
      color: #102312;
      border-color: #8bd61e;
      box-shadow: 0 0 18px rgba(120, 194, 0, 0.18);
      animation: convertReadyPulse 1.8s ease-in-out infinite;
    }
    .download-ready,
    .download-ready.btn {
      background: #78c200;
      color: #102312;
      border: 1px solid #8bd61e;
      box-shadow: 0 0 18px rgba(120, 194, 0, 0.16);
    }
    .download-done,
    .download-done.btn {
      background: #8ea0ff;
      color: #0f1328;
      border: 1px solid transparent;
      box-shadow: none;
    }
    @keyframes convertReadyPulse {
      0%, 100% {
        background: #78c200;
        color: #102312;
        border-color: #8bd61e;
        box-shadow: 0 0 18px rgba(120, 194, 0, 0.18);
      }
      50% {
        background: #1b1f30;
        color: #fff;
        border-color: #31364b;
        box-shadow: 0 0 0 rgba(120, 194, 0, 0);
      }
    }
    .btn[disabled] { opacity: .55; cursor: not-allowed; }
    input[type=file] { display: none; }
    .panel {
      margin-top: 16px;
      border: 1px solid #2c3040;
      border-radius: 12px;
      padding: 14px 16px;
      background: #0d1019;
    }
    .status-panel {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(1120px, calc(100vw - 48px));
      z-index: 2000;
      margin-top: 0;
      padding: 8px 12px;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.35);
      background: rgba(13, 16, 25, 0.96);
      backdrop-filter: blur(10px);
    }
    .status-panel,
    .status-panel.ok,
    .status-panel.warn,
    .status-panel.bad {
      border-width: 2px;
      border-bottom-width: 0;
      border-color: #78c200;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-queue-strip {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 2px solid #78c200;
    }
    .status-panel .file-box-content {
      justify-content: flex-start;
      gap: 10px;
    }
    .status-panel .file-box-copy {
      flex: 1 1 auto;
      min-width: 0;
    }
    .status-panel .status-queue-controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }
    .status-panel .file-box-preview {
      flex: 0 0 260px;
    }
    .status-panel .file-actions {
      gap: 8px;
    }
    .status-panel .file-action {
      min-width: 138px;
      padding: 10px 14px;
      font-size: 14px;
    }
    .status-panel #fileBoxTitle {
      font-size: 13px;
    }
    .status-panel #fileMeta {
      margin-top: 4px !important;
      font-size: 13px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-panel .file-box-preview audio {
      width: 100%;
      max-width: 260px;
    }
    .status-panel strong {
      font-size: 14px;
      line-height: 1.1;
      flex: 0 0 auto;
    }
    .status-text {
      margin-top: 0;
      flex: 1 1 auto;
      min-width: 0;
    }
    .file-box-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .file-box-copy {
      min-width: 0;
      flex: 0 1 220px;
    }
    .file-box-preview {
      min-width: 0;
      flex: 1 1 280px;
    }
    .file-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .file-action {
      min-width: 190px;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }
    .history-item {
      border: 1px solid #2c3040;
      border-radius: 12px;
      padding: 14px 16px;
      background: #0d1019;
    }
    .panel-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .panel-summary {
      font-size: 14px;
      color: #b9bfd6;
    }
    .queue-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }
    .queue-item {
      border: 1px solid #2c3040;
      border-radius: 12px;
      padding: 14px 16px;
      background: #0d1019;
    }
    .queue-item-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .queue-copy {
      min-width: 0;
      flex: 1 1 auto;
    }
    .queue-status {
      flex: 0 0 auto;
    }
    .queue-item-result {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
      margin-left: auto;
    }
    .queue-item-result .file-box-preview {
      flex: 0 0 420px;
    }
    .queue-item-result .file-box-preview audio {
      width: 100%;
      max-width: 420px;
    }
    .queue-item-result .file-action {
      min-width: 180px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 94px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .badge.queued {
      background: #2b2416;
      color: #ffdd93;
      border-color: #8d6c2e;
    }
    .badge.working {
      background: #16243a;
      color: #9dc3ff;
      border-color: #355c94;
    }
    .badge.error {
      background: #321721;
      color: #ffb8c9;
      border-color: #a1425e;
    }
    .mono { font-family: Consolas, monospace; word-break: break-word; }
    .ok { border-color: #2f8f5b; }
    .warn { border-color: #8d6c2e; }
    .bad { border-color: #a1425e; }
    progress {
      width: 100%;
      max-width: 420px;
      flex: 0 1 420px;
      height: 10px;
      margin-top: 0;
    }
    audio { width: 100%; margin-top: 12px; }
    .file-box-preview audio { margin-top: 0; }
    .small { font-size: 14px; color: #b9bfd6; }
    @media (max-width: 640px) {
      .settings-grid,
      .setting-field {
        flex-direction: column;
        align-items: stretch;
      }
      .setting-label {
        white-space: normal;
      }
      .file-box-content {
        flex-direction: column;
        align-items: stretch;
      }
      .status-queue-controls {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
        margin-left: 0;
      }
      .file-box-copy,
      .file-box-preview,
      .file-actions {
        width: 100%;
        flex: 1 1 auto;
      }
      .file-actions {
        flex-direction: column;
        align-items: stretch;
      }
      .file-action {
        width: 100%;
      }
      .file-action.btn {
        width: 100%;
      }
      .queue-item-content {
        flex-direction: column;
        align-items: stretch;
      }
      .queue-status {
        width: 100%;
      }
      .queue-item-result {
        width: 100%;
        margin-left: 0;
        flex-direction: column;
        align-items: stretch;
      }
      .queue-item-result .file-box-preview,
      .queue-item-result .file-actions {
        width: 100%;
        flex: 1 1 auto;
      }
      .badge {
        width: 100%;
      }
      .status-row {
        flex-wrap: wrap;
      }
      .status-text,
      progress {
        flex-basis: 100%;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div id="status" class="panel warn status-panel">
      <div class="status-row">
        <strong>Status</strong>
        <div id="statusText" class="small status-text">Waiting for file.</div>
        <progress id="progress" value="0" max="100" hidden></progress>
      </div>
      <div id="fileBox" class="status-queue-strip" hidden>
        <div class="file-box-content">
          <div class="file-box-copy">
            <strong id="fileBoxTitle">Next in queue</strong>
            <div id="fileMeta" class="small mono" style="margin-top:8px;"></div>
          </div>
          <div class="status-queue-controls">
            <div id="previewWrap" class="file-box-preview" hidden>
              <audio id="audioPreview" controls></audio>
            </div>
            <div class="file-actions">
              <button id="convertBtn" class="btn secondary file-action" disabled>Convert Next</button>
              <button id="convertAllBtn" class="btn secondary file-action" disabled hidden>Convert All</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h1 id="pageTitle">OPUS to MP3 Converter</h1>
      <p id="introText" class="intro-copy">GitHub Pages version. Runs in your browser using ffmpeg.wasm single-thread core.</p>

      <div class="mode-switch" role="group" aria-label="Conversion direction">
        <button id="modeOpusToMp3" class="btn secondary mode-btn active" type="button" aria-pressed="true">
          OPUS to MP3
        </button>
        <button id="modeMp3ToOpus" class="btn secondary mode-btn" type="button" aria-pressed="false">
          MP3 to OPUS
        </button>
      </div>

      <div class="panel">
        <div class="settings-grid">
          <label class="setting-field">
            <span id="qualityLabel" class="small setting-label">Output Quality MP3 bitrate</span>
            <select id="qualitySelect" class="setting-select"></select>
          </label>
        </div>
      </div>

      <div id="dropzone" class="dropzone">
        <strong id="dropTitle">Drop your .opus files here</strong>
        <div id="dropHelper" class="small" style="margin-top:6px;">You can also use compatible .ogg and .webm audio files.</div>
        <div class="row">
          <label class="btn" for="fileInput">Choose Files</label>
        </div>
        <input id="fileInput" type="file" accept=".opus,audio/opus,.ogg,.webm,audio/ogg,audio/webm" multiple />
      </div>

      <div id="queuePanel" class="panel" hidden>
        <div class="panel-title-row">
          <strong>Selected files</strong>
          <span id="queueSummary" class="panel-summary"></span>
        </div>
        <div id="queueList" class="queue-list"></div>
      </div>
    </div>
  </div>

  <script src="./ffmpeg.js"></script>
  <script>
    const LOCAL_CORE_URL = new URL('./ffmpeg-core.js', window.location.href).href;
    const LOCAL_WASM_URL = new URL('./ffmpeg-core.wasm', window.location.href).href;
    const QUALITY_OPTIONS = {
      opusToMp3: [
        { value: '128k', label: '128 kbps' },
        { value: '192k', label: '192 kbps' },
        { value: '256k', label: '256 kbps' },
        { value: '320k', label: '320 kbps' }
      ],
      mp3ToOpus: [
        { value: '96000', label: '96 kbps' },
        { value: '128000', label: '128 kbps' },
        { value: '160000', label: '160 kbps' },
        { value: '192000', label: '192 kbps' }
      ]
    };
    const QUALITY_DEFAULTS = {
      opusToMp3: '192k',
      mp3ToOpus: '128000'
    };
    const MODES = {
      opusToMp3: {
        title: 'OPUS to MP3 Converter',
        intro: 'GitHub Pages version. Convert OPUS-like audio to MP3 in your browser using a local ffmpeg.wasm single-thread core.',
        dropTitle: 'Drop your .opus files here',
        dropHelper: 'Choose one or many compatible .opus, .ogg, or .webm audio files.',
        qualityLabel: 'MP3 bitrate',
        accept: '.opus,audio/opus,.ogg,.webm,audio/ogg,audio/webm',
        extensions: ['opus', 'ogg', 'webm'],
        outputExtension: 'mp3',
        outputMime: 'audio/mpeg',
        progressLabel: 'Converting to MP3...',
        fileError: 'This mode accepts .opus, .ogg, or .webm audio files.',
        buildArgs: (inputName, outputName, quality) => ['-i', inputName, '-b:a', quality, outputName]
      },
      mp3ToOpus: {
        title: 'MP3 to OPUS Converter',
        intro: 'GitHub Pages version. Convert MP3 audio to Ogg Opus in your browser using native browser audio tools.',
        dropTitle: 'Drop your .mp3 files here',
        dropHelper: 'Choose one or more MP3 audio files to convert them into .opus.',
        qualityLabel: 'OPUS bitrate',
        accept: '.mp3,audio/mpeg',
        extensions: ['mp3'],
        outputExtension: 'opus',
        outputMime: 'audio/ogg; codecs=opus',
        progressLabel: 'Encoding Ogg Opus...',
        fileError: 'This mode accepts .mp3 audio files.',
        engine: 'mediaRecorder'
      }
    };

    const pageTitle = document.getElementById('pageTitle');
    const introText = document.getElementById('introText');
    const dropTitle = document.getElementById('dropTitle');
    const dropHelper = document.getElementById('dropHelper');
    const modeOpusToMp3 = document.getElementById('modeOpusToMp3');
    const modeMp3ToOpus = document.getElementById('modeMp3ToOpus');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileBoxTitle = document.getElementById('fileBoxTitle');
    const convertBtn = document.getElementById('convertBtn');
    const convertAllBtn = document.getElementById('convertAllBtn');
    const fileBox = document.getElementById('fileBox');
    const fileMeta = document.getElementById('fileMeta');
    const previewWrap = document.getElementById('previewWrap');
    const qualityLabel = document.getElementById('qualityLabel');
    const qualitySelect = document.getElementById('qualitySelect');
    const queuePanel = document.getElementById('queuePanel');
    const queueList = document.getElementById('queueList');
    const queueSummary = document.getElementById('queueSummary');
    const statusBox = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const progressBar = document.getElementById('progress');
    const audioPreview = document.getElementById('audioPreview');

    const { FFmpeg } = FFmpegWASM;

    let ffmpeg = null;
    let loaded = false;
    let queueItems = [];
    let queueItemId = 0;
    let isConverting = false;
    let activeQueueItemId = null;
    let activeProgressLabel = '';
    let currentPreviewUrl = '';
    const archivedUrls = [];
    const qualityState = { ...QUALITY_DEFAULTS };
    let currentModeKey = 'opusToMp3';

    function prettyBytes(bytes) {
      const units = ['B', 'KB', 'MB', 'GB'];
      let i = 0;
      let n = bytes || 0;
      while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
      return (n >= 10 || i === 0 ? n.toFixed(0) : n.toFixed(1)) + ' ' + units[i];
    }

    function currentMode() {
      return MODES[currentModeKey];
    }

    async function fetchArrayBuffer(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error('Failed to fetch ' + url + ' (' + response.status + ')');
      }
      return await response.arrayBuffer();
    }

    async function fetchFile(input) {
      if (input instanceof Uint8Array) {
        return input;
      }

      if (input instanceof ArrayBuffer) {
        return new Uint8Array(input);
      }

      if (input instanceof Blob) {
        return new Uint8Array(await input.arrayBuffer());
      }

      if (typeof input === 'string') {
        return new Uint8Array(await fetchArrayBuffer(input));
      }

      throw new Error('Unsupported input type for FFmpeg file loading.');
    }

    function updateStatusSpacer() {
      const bannerHeight = statusBox.offsetHeight || 0;
      document.documentElement.style.setProperty('--status-space', (bannerHeight + 40) + 'px');
    }

    function setStatus(type, text, progress) {
      statusBox.className = 'panel status-panel ' + type;
      statusText.textContent = text;
      statusBox.hidden = false;
      if (typeof progress === 'number') {
        progressBar.hidden = false;
        progressBar.value = Math.max(0, Math.min(100, progress));
      } else {
        progressBar.hidden = true;
      }
      window.requestAnimationFrame(updateStatusSpacer);
    }

    function setConvertButtonReady(isReady) {
      convertBtn.classList.toggle('convert-ready', isReady);
    }

    function setDownloadButtonState(button, didDownload) {
      button.classList.toggle('download-ready', !didDownload);
      button.classList.toggle('download-done', didDownload);
    }

    function setPreviewFile(file) {
      if (currentPreviewUrl) {
        URL.revokeObjectURL(currentPreviewUrl);
        currentPreviewUrl = '';
      }

      if (!file) {
        previewWrap.hidden = true;
        audioPreview.removeAttribute('src');
        audioPreview.load();
        return;
      }

      currentPreviewUrl = URL.createObjectURL(file);
      audioPreview.src = currentPreviewUrl;
      previewWrap.hidden = false;
    }

    function getQualityValue(modeKey) {
      return qualityState[modeKey] || QUALITY_DEFAULTS[modeKey];
    }

    function getQualityLabel(modeKey) {
      const option = QUALITY_OPTIONS[modeKey].find((item) => item.value === getQualityValue(modeKey));
      return option ? option.label : '';
    }

    function getPendingItems() {
      return queueItems.filter((item) => item.status === 'queued');
    }

    function getActiveItem() {
      return queueItems.find((item) => item.id === activeQueueItemId) || null;
    }

    function getNextPendingItem() {
      return getPendingItems()[0] || null;
    }

    function updateModeButtons() {
      const isOpusToMp3 = currentModeKey === 'opusToMp3';
      modeOpusToMp3.classList.toggle('active', isOpusToMp3);
      modeMp3ToOpus.classList.toggle('active', !isOpusToMp3);
      modeOpusToMp3.setAttribute('aria-pressed', String(isOpusToMp3));
      modeMp3ToOpus.setAttribute('aria-pressed', String(!isOpusToMp3));
      modeOpusToMp3.disabled = isConverting;
      modeMp3ToOpus.disabled = isConverting;
      qualitySelect.disabled = isConverting;
    }

    function populateQualityOptions() {
      qualityLabel.textContent = 'Output Quality ' + currentMode().qualityLabel;
      qualitySelect.textContent = '';

      for (const option of QUALITY_OPTIONS[currentModeKey]) {
        const element = document.createElement('option');
        element.value = option.value;
        element.textContent = option.label;
        qualitySelect.appendChild(element);
      }

      qualitySelect.value = getQualityValue(currentModeKey);
    }

    function updateModeUi() {
      const mode = currentMode();
      document.title = mode.title;
      pageTitle.textContent = mode.title;
      introText.textContent = mode.intro;
      dropTitle.textContent = mode.dropTitle;
      dropHelper.textContent = mode.dropHelper;
      fileInput.accept = mode.accept;
      convertBtn.textContent = 'Convert Next';
      convertAllBtn.textContent = 'Convert All';
      populateQualityOptions();
      updateModeButtons();
    }

    function clearQueue(waitingText, statusType) {
      queueItems = [];
      queueItemId = 0;
      activeQueueItemId = null;
      activeProgressLabel = '';
      fileInput.value = '';
      fileBox.hidden = true;
      queuePanel.hidden = true;
      queueSummary.textContent = '';
      queueList.textContent = '';
      convertBtn.disabled = true;
      convertAllBtn.disabled = true;
      convertAllBtn.hidden = true;
      setConvertButtonReady(false);
      setPreviewFile(null);
      setStatus(statusType || 'warn', waitingText || 'Waiting for file.');
    }

    function fileExtension(fileName) {
      const parts = (fileName || '').toLowerCase().split('.');
      return parts.length > 1 ? parts.pop() : '';
    }

    function fileMatchesMode(file) {
      return currentMode().extensions.includes(fileExtension(file.name));
    }

    function buildOutputName(fileName) {
      const outputExtension = currentMode().outputExtension;
      if (!/\.[^.]+$/.test(fileName || '')) {
        return 'converted.' + outputExtension;
      }
      return fileName.replace(/\.[^.]+$/, '') + '.' + outputExtension;
    }

    function queueStatusLabel(item) {
      switch (item.status) {
        case 'working':
          return 'Converting';
        case 'error':
          return 'Error';
        default:
          return 'Waiting';
      }
    }

    function buildQueueSummary() {
      const summary = {
        queued: queueItems.filter((item) => item.status === 'queued').length,
        working: queueItems.filter((item) => item.status === 'working').length,
        error: queueItems.filter((item) => item.status === 'error').length
      };
      const parts = [queueItems.length + ' selected'];

      if (summary.queued) {
        parts.push(summary.queued + ' waiting');
      }
      if (summary.working) {
        parts.push(summary.working + ' converting');
      }
      if (summary.error) {
        parts.push(summary.error + ' failed');
      }

      return parts.join(' | ');
    }

    function renderQueue() {
      queueList.textContent = '';

      if (!queueItems.length) {
        queuePanel.hidden = true;
        queueSummary.textContent = '';
        return;
      }

      for (const item of queueItems) {
        const row = document.createElement('div');
        row.className = 'queue-item';

        const content = document.createElement('div');
        content.className = 'queue-item-content';

        const copy = document.createElement('div');
        copy.className = 'queue-copy';

        const name = document.createElement('div');
        name.className = 'small mono';
        name.textContent = item.file.name + ' (' + prettyBytes(item.file.size) + ')';

        const detail = document.createElement('div');
        detail.className = 'small';
        detail.style.marginTop = '8px';
        detail.textContent = item.detail;

        copy.appendChild(name);
        copy.appendChild(detail);
        content.appendChild(copy);

        if (item.status === 'done' && item.outputUrl) {
          const resultWrap = document.createElement('div');
          resultWrap.className = 'queue-item-result';

          const preview = document.createElement('div');
          preview.className = 'file-box-preview';
          const previewAudio = document.createElement('audio');
          previewAudio.controls = true;
          previewAudio.src = item.outputUrl;
          preview.appendChild(previewAudio);

          const actions = document.createElement('div');
          actions.className = 'file-actions';
          const downloadLink = document.createElement('a');
          downloadLink.className = 'btn file-action';
          downloadLink.href = item.outputUrl;
          downloadLink.download = item.outputName || buildOutputName(item.file.name);
          downloadLink.textContent = 'Download';
          setDownloadButtonState(downloadLink, !!item.didDownload);
          downloadLink.addEventListener('click', () => {
            item.didDownload = true;
            setDownloadButtonState(downloadLink, true);
          });
          actions.appendChild(downloadLink);

          resultWrap.appendChild(preview);
          resultWrap.appendChild(actions);
          content.appendChild(resultWrap);
        } else {
          const statusWrap = document.createElement('div');
          statusWrap.className = 'queue-status';

          const badge = document.createElement('span');
          badge.className = 'badge ' + item.status;
          badge.textContent = queueStatusLabel(item);

          statusWrap.appendChild(badge);
          content.appendChild(statusWrap);
        }

        row.appendChild(content);
        queueList.appendChild(row);
      }

      queueSummary.textContent = buildQueueSummary();
      queuePanel.hidden = false;
    }

    function updateQueueUi() {
      const activeItem = getActiveItem();
      const nextItem = activeItem || getNextPendingItem();
      const pendingCount = getPendingItems().length;

      updateModeButtons();
      renderQueue();

      if (!nextItem) {
        fileBox.hidden = true;
        setPreviewFile(null);
        window.requestAnimationFrame(updateStatusSpacer);
        return;
      }

      fileBox.hidden = false;
      fileBoxTitle.textContent = activeItem ? 'Converting now' : (pendingCount > 1 ? 'Next in queue' : 'Ready to convert');
      fileMeta.textContent =
        nextItem.file.name +
        ' (' + prettyBytes(nextItem.file.size) + ')' +
        (activeItem
          ? (pendingCount ? ' | ' + pendingCount + ' waiting' : '')
          : (pendingCount > 1 ? ' | ' + pendingCount + ' files pending' : ''));

      convertBtn.disabled = isConverting || !pendingCount;
      convertAllBtn.hidden = pendingCount < 2;
      convertAllBtn.disabled = isConverting || pendingCount < 2;
      setConvertButtonReady(!isConverting && pendingCount > 0);
      setPreviewFile(nextItem.file);
      window.requestAnimationFrame(updateStatusSpacer);
    }

    function enqueueFiles(fileList) {
      const files = Array.from(fileList || []);
      let added = 0;
      let skipped = 0;

      if (!files.length) {
        return;
      }

      for (const file of files) {
        if (!fileMatchesMode(file)) {
          skipped += 1;
          continue;
        }

        queueItemId += 1;
        queueItems.push({
          id: queueItemId,
          file: file,
          status: 'queued',
          detail: 'Ready to convert at ' + getQualityLabel(currentModeKey) + '.',
          outputName: '',
          outputUrl: '',
          didDownload: false
        });
        added += 1;
      }

      fileInput.value = '';
      updateQueueUi();

      if (!added) {
        setStatus('bad', skipped ? 'No compatible files were selected.' : 'Waiting for file.');
        return;
      }

      const pendingCount = getPendingItems().length;
      const summary =
        added + ' file' + (added === 1 ? '' : 's') + ' selected.' +
        (skipped ? ' Skipped ' + skipped + ' incompatible file' + (skipped === 1 ? '' : 's') + '.' : '') +
        ' ' + pendingCount + ' waiting.';
      setStatus('warn', summary.trim());
    }

    function getAudioContextConstructor() {
      return window.AudioContext || window.webkitAudioContext || null;
    }

    function ensureOpusRecorderSupport() {
      if (typeof MediaRecorder === 'undefined') {
        throw new Error('This browser does not support browser-native OPUS recording.');
      }

      if (typeof MediaRecorder.isTypeSupported === 'function' &&
          !MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) {
        throw new Error('This browser cannot create .opus files. Try Firefox for MP3 to OPUS conversion.');
      }
    }

    async function decodeAudioFile(file) {
      const AudioContextCtor = getAudioContextConstructor();
      if (!AudioContextCtor) {
        throw new Error('This browser does not support Web Audio decoding.');
      }

      const audioContext = new AudioContextCtor();
      try {
        setStatus('warn', 'Decoding ' + file.name + '...', 15);
        const arrayBuffer = await file.arrayBuffer();
        return await audioContext.decodeAudioData(arrayBuffer.slice(0));
      } finally {
        try {
          await audioContext.close();
        } catch (e) {}
      }
    }

    async function encodeAudioBufferToOpus(audioBuffer, audioBitsPerSecond) {
      ensureOpusRecorderSupport();

      const AudioContextCtor = getAudioContextConstructor();
      if (!AudioContextCtor) {
        throw new Error('This browser does not support Web Audio playback for OPUS encoding.');
      }

      const audioContext = new AudioContextCtor();
      const destination = audioContext.createMediaStreamDestination();
      const source = audioContext.createBufferSource();
      const chunks = [];
      let progressTimer = null;

      source.buffer = audioBuffer;
      source.connect(destination);

      return await new Promise(async (resolve, reject) => {
        let recorder;

        function cleanup() {
          if (progressTimer) {
            window.clearInterval(progressTimer);
            progressTimer = null;
          }

          try { source.disconnect(); } catch (e) {}
          try { destination.disconnect(); } catch (e) {}
          try {
            if (audioContext.state !== 'closed') {
              audioContext.close();
            }
          } catch (e) {}
        }

        try {
          recorder = new MediaRecorder(destination.stream, {
            mimeType: 'audio/ogg;codecs=opus',
            audioBitsPerSecond: audioBitsPerSecond
          });
        } catch (error) {
          cleanup();
          reject(error);
          return;
        }

        recorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            chunks.push(event.data);
          }
        };

        recorder.onerror = (event) => {
          cleanup();
          reject(event.error || new Error('MediaRecorder failed during OPUS encoding.'));
        };

        recorder.onstop = () => {
          cleanup();
          const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
          if (!blob.size) {
            reject(new Error('Browser produced an empty .opus file.'));
            return;
          }
          resolve(blob);
        };

        source.onended = () => {
          if (recorder && recorder.state !== 'inactive') {
            recorder.stop();
          }
        };

        try {
          await audioContext.resume();
          const startedAt = performance.now();
          progressTimer = window.setInterval(() => {
            const elapsedSeconds = (performance.now() - startedAt) / 1000;
            const totalSeconds = Math.max(audioBuffer.duration, 0.1);
            const progress = 20 + Math.round(Math.min(75, (elapsedSeconds / totalSeconds) * 75));
            setStatus('warn', activeProgressLabel || currentMode().progressLabel, progress);
          }, 200);

          recorder.start(250);
          source.start(0);
        } catch (error) {
          cleanup();
          reject(error);
        }
      });
    }

    function setMode(nextModeKey) {
      if (isConverting) {
        return;
      }

      if (!MODES[nextModeKey] || nextModeKey === currentModeKey) {
        return;
      }

      currentModeKey = nextModeKey;
      updateModeUi();
      clearQueue('Waiting for file.');
    }

    async function ensureLoaded() {
      if (loaded) return;

      try {
        setStatus('warn', 'Loading local FFmpeg core... first load can take 10-30 seconds.', 5);

        ffmpeg = new FFmpeg();
        ffmpeg.on('progress', ({ progress }) => {
          setStatus('warn', activeProgressLabel || currentMode().progressLabel, Math.round(progress * 100));
        });
        ffmpeg.on('log', ({ message }) => {
          if (message && /error|failed/i.test(message)) {
            console.error(message);
          }
        });

        await ffmpeg.load({
          coreURL: LOCAL_CORE_URL,
          wasmURL: LOCAL_WASM_URL
        });

        loaded = true;
        setStatus('ok', 'Local FFmpeg core loaded. Ready.');
      } catch (err) {
        console.error(err);
        setStatus('bad', 'Load failed: ' + (err && err.message ? err.message : err));
        throw err;
      }
    }

    async function convertQueueItem(item, batchIndex, batchTotal) {
      const mode = currentMode();
      const quality = getQualityValue(currentModeKey);
      const ext = fileExtension(item.file.name) || mode.extensions[0];
      const inputName = 'input-' + item.id + '.' + ext;
      const outputName = 'output-' + item.id + '.' + mode.outputExtension;
      let blob;

      activeQueueItemId = item.id;
      activeProgressLabel =
        'Converting ' +
        (batchIndex + 1) +
        ' of ' +
        batchTotal +
        ': ' +
        item.file.name;
      item.status = 'working';
      item.detail = 'Using ' + getQualityLabel(currentModeKey) + '.';
      updateQueueUi();

      if (mode.engine === 'mediaRecorder') {
        const audioBuffer = await decodeAudioFile(item.file);
        blob = await encodeAudioBufferToOpus(audioBuffer, Number(quality));
      } else {
        await ensureLoaded();

        setStatus('warn', 'Preparing ' + item.file.name + '...', 10);
        await ffmpeg.writeFile(inputName, await fetchFile(item.file));

        setStatus('warn', activeProgressLabel, 15);
        await ffmpeg.exec(mode.buildArgs(inputName, outputName, quality));

        const data = await ffmpeg.readFile(outputName);
        blob = new Blob([data.buffer], { type: mode.outputMime });

        try { await ffmpeg.deleteFile(inputName); } catch (e) {}
        try { await ffmpeg.deleteFile(outputName); } catch (e) {}
      }

      const outName = buildOutputName(item.file.name);
      const outputUrl = URL.createObjectURL(blob);
      archivedUrls.push(outputUrl);
      item.status = 'done';
      item.detail = outName + ' | ' + prettyBytes(blob.size);
      item.outputName = outName;
      item.outputUrl = outputUrl;
      item.didDownload = false;
    }

    async function runConversions(convertAll) {
      const pendingItems = getPendingItems();

      if (!pendingItems.length || isConverting) {
        return;
      }

      isConverting = true;
      updateQueueUi();

      const itemsToConvert = convertAll ? pendingItems.slice() : [pendingItems[0]];
      let completed = 0;
      let failed = 0;

      try {
        for (let index = 0; index < itemsToConvert.length; index += 1) {
          const item = itemsToConvert[index];

          try {
            await convertQueueItem(item, index, itemsToConvert.length);
            completed += 1;
          } catch (err) {
            console.error(err);
            item.status = 'error';
            item.detail = err && err.message ? err.message : String(err);
            failed += 1;
          } finally {
            activeQueueItemId = null;
            activeProgressLabel = '';
            updateQueueUi();
          }
        }
      } finally {
        isConverting = false;
        activeQueueItemId = null;
        activeProgressLabel = '';
        updateQueueUi();
      }

      const remaining = getPendingItems().length;

      if (failed && !completed) {
        setStatus('bad', 'No files were converted successfully.' + (remaining ? ' ' + remaining + ' files are still waiting.' : ''));
        return;
      }

      if (itemsToConvert.length === 1) {
        setStatus(
          failed ? 'warn' : 'ok',
          failed
            ? 'That file failed to convert.' + (remaining ? ' ' + remaining + ' files still waiting.' : '')
            : 'Conversion finished.' + (remaining ? ' ' + remaining + ' files still waiting.' : ''),
          failed ? undefined : 100
        );
        return;
      }

      const parts = [];
      if (completed) {
        parts.push(completed + ' converted');
      }
      if (failed) {
        parts.push(failed + ' failed');
      }
      if (remaining) {
        parts.push(remaining + ' still waiting');
      }

      setStatus(failed ? 'warn' : 'ok', 'Batch finished: ' + parts.join(', ') + '.', failed ? undefined : 100);
    }

    modeOpusToMp3.addEventListener('click', () => setMode('opusToMp3'));
    modeMp3ToOpus.addEventListener('click', () => setMode('mp3ToOpus'));
    qualitySelect.addEventListener('change', () => {
      qualityState[currentModeKey] = qualitySelect.value;

      for (const item of getPendingItems()) {
        item.detail = 'Ready to convert at ' + getQualityLabel(currentModeKey) + '.';
      }

      updateQueueUi();
    });
    fileInput.addEventListener('change', (e) => enqueueFiles(e.target.files));
    convertBtn.addEventListener('click', () => runConversions(false));
    convertAllBtn.addEventListener('click', () => runConversions(true));

    ['dragenter','dragover'].forEach(type => {
      dropzone.addEventListener(type, (e) => {
        e.preventDefault();
        dropzone.classList.add('drag');
      });
    });
    ['dragleave','drop'].forEach(type => {
      dropzone.addEventListener(type, (e) => {
        e.preventDefault();
        dropzone.classList.remove('drag');
      });
    });
    dropzone.addEventListener('drop', (e) => enqueueFiles(e.dataTransfer.files));

    updateModeUi();
    clearQueue('Waiting for file.');

    window.addEventListener('resize', updateStatusSpacer);
    window.addEventListener('beforeunload', () => {
      if (currentPreviewUrl) {
        URL.revokeObjectURL(currentPreviewUrl);
      }
      for (const url of archivedUrls) {
        URL.revokeObjectURL(url);
      }
    });
  </script>
</body>
</html>
