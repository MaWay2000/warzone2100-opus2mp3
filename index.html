<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPUS to MP3 Converter</title>
  <meta name="description" content="Convert OPUS and MP3 audio directly in your browser." />
  <link rel="icon" href="data:,">
  <style>
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: #12131a;
      border: 1px solid #2a2d3a;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    h1 { margin: 0 0 12px; font-size: 42px; }
    p { color: #c8cbe0; }
    .mode-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .mode-btn {
      flex: 1 1 220px;
      min-width: 0;
    }
    .mode-btn.active {
      background: #b8f5b2;
      color: #102312;
      border-color: #7ddf72;
      box-shadow: 0 0 0 1px rgba(125, 223, 114, 0.2) inset;
    }
    .dropzone {
      margin-top: 18px;
      border: 2px dashed #5968ff66;
      border-radius: 16px;
      padding: 22px;
      text-align: center;
      background: #0d1020;
    }
    .dropzone.drag { border-color: #7c8cff; background: #141935; }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 14px;
    }
    .btn, label.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      background: #8ea0ff;
      color: #0f1328;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .btn.secondary {
      background: #1b1f30;
      color: #fff;
      border: 1px solid #31364b;
    }
    .btn[disabled] { opacity: .55; cursor: not-allowed; }
    input[type=file] { display: none; }
    .panel {
      margin-top: 16px;
      border: 1px solid #2c3040;
      border-radius: 12px;
      padding: 14px 16px;
      background: #0d1019;
    }
    .file-box-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .file-box-copy {
      min-width: 0;
      flex: 0 1 220px;
    }
    .file-box-preview {
      min-width: 0;
      flex: 1 1 280px;
    }
    .file-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .file-action {
      min-width: 190px;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }
    .history-item {
      border: 1px solid #2c3040;
      border-radius: 12px;
      padding: 14px 16px;
      background: #0d1019;
    }
    .mono { font-family: Consolas, monospace; word-break: break-word; }
    .ok { border-color: #2f8f5b; }
    .warn { border-color: #8d6c2e; }
    .bad { border-color: #a1425e; }
    progress { width: 100%; height: 16px; margin-top: 10px; }
    audio { width: 100%; margin-top: 12px; }
    .file-box-preview audio { margin-top: 0; }
    .small { font-size: 14px; color: #b9bfd6; }
    @media (max-width: 640px) {
      .file-box-content {
        flex-direction: column;
        align-items: stretch;
      }
      .file-box-copy,
      .file-box-preview,
      .file-actions {
        width: 100%;
        flex: 1 1 auto;
      }
      .file-actions {
        flex-direction: column;
        align-items: stretch;
      }
      .file-action {
        width: 100%;
      }
      .file-action.btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="pageTitle">OPUS to MP3 Converter</h1>
    <p id="introText">GitHub Pages version. Runs in your browser using ffmpeg.wasm single-thread core.</p>

    <div class="mode-switch" role="group" aria-label="Conversion direction">
      <button id="modeOpusToMp3" class="btn secondary mode-btn active" type="button" aria-pressed="true">
        OPUS to MP3
      </button>
      <button id="modeMp3ToOpus" class="btn secondary mode-btn" type="button" aria-pressed="false">
        MP3 to OPUS
      </button>
    </div>

    <div id="dropzone" class="dropzone">
      <strong id="dropTitle">Drop your .opus file here</strong>
      <div class="small" style="margin-top:8px;">or choose a file below</div>
      <div id="dropHelper" class="small" style="margin-top:6px;">You can also use compatible .ogg and .webm audio files.</div>
      <div class="row">
        <label class="btn" for="fileInput">Choose File</label>
      </div>
      <input id="fileInput" type="file" accept=".opus,audio/opus,.ogg,.webm,audio/ogg,audio/webm" />
    </div>

    <div id="fileBox" class="panel" hidden>
      <div class="file-box-content">
        <div class="file-box-copy">
          <strong>Selected file</strong>
          <div id="fileMeta" class="small mono" style="margin-top:8px;"></div>
        </div>
        <div id="previewWrap" class="file-box-preview" hidden>
          <audio id="audioPreview" controls></audio>
        </div>
        <div class="file-actions">
          <button id="convertBtn" class="btn secondary file-action" disabled>Convert to MP3</button>
          <a id="downloadBtn" class="btn file-action" href="#" download="converted.mp3" hidden>Download</a>
        </div>
      </div>
    </div>

    <div id="status" class="panel warn">
      <strong>Status</strong>
      <div id="statusText" class="small" style="margin-top:8px;">Waiting for file.</div>
      <progress id="progress" value="0" max="100" hidden></progress>
    </div>

    <div id="result" class="panel ok" hidden>
      <strong>Finished</strong>
      <div id="resultText" class="small" style="margin-top:8px;"></div>
    </div>

    <div id="historyPanel" class="panel" hidden>
      <strong>Converted files</strong>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>

  <script src="./ffmpeg.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
  <script>
    const MODES = {
      opusToMp3: {
        title: 'OPUS to MP3 Converter',
        intro: 'GitHub Pages version. Convert OPUS-like audio to MP3 in your browser using ffmpeg.wasm single-thread core.',
        dropTitle: 'Drop your .opus file here',
        dropHelper: 'You can also use compatible .ogg and .webm audio files.',
        convertLabel: 'Convert to MP3',
        downloadLabel: 'Download MP3',
        accept: '.opus,audio/opus,.ogg,.webm,audio/ogg,audio/webm',
        extensions: ['opus', 'ogg', 'webm'],
        outputExtension: 'mp3',
        outputMime: 'audio/mpeg',
        progressLabel: 'Converting to MP3...',
        fileError: 'This mode accepts .opus, .ogg, or .webm audio files.',
        buildArgs: (inputName, outputName) => ['-i', inputName, '-b:a', '192k', outputName]
      },
      mp3ToOpus: {
        title: 'MP3 to OPUS Converter',
        intro: 'GitHub Pages version. Convert MP3 audio to Ogg Opus in your browser using native browser audio tools.',
        dropTitle: 'Drop your .mp3 file here',
        dropHelper: 'Choose an MP3 audio file to convert it into .opus.',
        convertLabel: 'Convert to OPUS',
        downloadLabel: 'Download OPUS',
        accept: '.mp3,audio/mpeg',
        extensions: ['mp3'],
        outputExtension: 'opus',
        outputMime: 'audio/ogg; codecs=opus',
        progressLabel: 'Encoding Ogg Opus...',
        fileError: 'This mode accepts .mp3 audio files.',
        engine: 'mediaRecorder'
      }
    };

    const pageTitle = document.getElementById('pageTitle');
    const introText = document.getElementById('introText');
    const dropTitle = document.getElementById('dropTitle');
    const dropHelper = document.getElementById('dropHelper');
    const modeOpusToMp3 = document.getElementById('modeOpusToMp3');
    const modeMp3ToOpus = document.getElementById('modeMp3ToOpus');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileBox = document.getElementById('fileBox');
    const fileMeta = document.getElementById('fileMeta');
    const previewWrap = document.getElementById('previewWrap');
    const statusBox = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const progressBar = document.getElementById('progress');
    const resultBox = document.getElementById('result');
    const resultText = document.getElementById('resultText');
    const historyPanel = document.getElementById('historyPanel');
    const historyList = document.getElementById('historyList');
    const audioPreview = document.getElementById('audioPreview');

    const { FFmpeg } = FFmpegWASM;
    const { fetchFile, toBlobURL } = FFmpegUtil;

    let ffmpeg = null;
    let loaded = false;
    let selectedFile = null;
    const archivedUrls = [];
    let currentModeKey = 'opusToMp3';

    function prettyBytes(bytes) {
      const units = ['B', 'KB', 'MB', 'GB'];
      let i = 0;
      let n = bytes || 0;
      while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
      return (n >= 10 || i === 0 ? n.toFixed(0) : n.toFixed(1)) + ' ' + units[i];
    }

    function currentMode() {
      return MODES[currentModeKey];
    }

    function setStatus(type, text, progress) {
      statusBox.className = 'panel ' + type;
      statusText.textContent = text;
      statusBox.hidden = false;
      if (typeof progress === 'number') {
        progressBar.hidden = false;
        progressBar.value = Math.max(0, Math.min(100, progress));
      } else {
        progressBar.hidden = true;
      }
    }

    function resetSelectionForNextFile() {
      selectedFile = null;
      fileInput.value = '';
      fileBox.hidden = true;
      resetResult();
      convertBtn.disabled = true;
      statusBox.hidden = true;
      resultBox.hidden = true;
    }

    function addConvertedItem(fileName, blob) {
      const itemUrl = URL.createObjectURL(blob);
      archivedUrls.push(itemUrl);

      const item = document.createElement('div');
      item.className = 'history-item';

      const content = document.createElement('div');
      content.className = 'file-box-content';

      const copy = document.createElement('div');
      copy.className = 'file-box-copy';
      copy.innerHTML =
        '<strong>Converted file</strong>' +
        '<div class="small mono" style="margin-top:8px;">' +
        fileName + ' (' + prettyBytes(blob.size) + ')</div>';

      const preview = document.createElement('div');
      preview.className = 'file-box-preview';
      const previewAudio = document.createElement('audio');
      previewAudio.controls = true;
      previewAudio.src = itemUrl;
      preview.appendChild(previewAudio);

      const actions = document.createElement('div');
      actions.className = 'file-actions';
      const downloadLink = document.createElement('a');
      downloadLink.className = 'btn file-action';
      downloadLink.href = itemUrl;
      downloadLink.download = fileName;
      downloadLink.textContent = 'Download';
      actions.appendChild(downloadLink);

      content.appendChild(copy);
      content.appendChild(preview);
      content.appendChild(actions);
      item.appendChild(content);
      historyList.prepend(item);
      historyPanel.hidden = false;
    }

    function resetResult() {
      resultBox.hidden = true;
      previewWrap.hidden = true;
      downloadBtn.hidden = true;
      convertBtn.hidden = false;
      audioPreview.removeAttribute('src');
      audioPreview.load();
    }

    function updateModeButtons() {
      const isOpusToMp3 = currentModeKey === 'opusToMp3';
      modeOpusToMp3.classList.toggle('active', isOpusToMp3);
      modeMp3ToOpus.classList.toggle('active', !isOpusToMp3);
      modeOpusToMp3.setAttribute('aria-pressed', String(isOpusToMp3));
      modeMp3ToOpus.setAttribute('aria-pressed', String(!isOpusToMp3));
    }

    function updateModeUi() {
      const mode = currentMode();
      document.title = mode.title;
      pageTitle.textContent = mode.title;
      introText.textContent = mode.intro;
      dropTitle.textContent = mode.dropTitle;
      dropHelper.textContent = mode.dropHelper;
      convertBtn.textContent = mode.convertLabel;
      downloadBtn.textContent = 'Download';
      downloadBtn.download = 'converted.' + mode.outputExtension;
      fileInput.accept = mode.accept;
      updateModeButtons();
    }

    function clearSelection(waitingText, statusType) {
      selectedFile = null;
      fileInput.value = '';
      fileBox.hidden = true;
      resetResult();
      convertBtn.disabled = true;
      setStatus(statusType || 'warn', waitingText || 'Waiting for file.');
    }

    function fileExtension(fileName) {
      const parts = (fileName || '').toLowerCase().split('.');
      return parts.length > 1 ? parts.pop() : '';
    }

    function fileMatchesMode(file) {
      return currentMode().extensions.includes(fileExtension(file.name));
    }

    function setFile(file) {
      resetResult();

      if (!file) {
        clearSelection();
        return;
      }

      if (!fileMatchesMode(file)) {
        clearSelection(currentMode().fileError, 'bad');
        return;
      }

      selectedFile = file;
      fileBox.hidden = false;
      fileMeta.textContent = file.name + ' (' + prettyBytes(file.size) + ')';
      convertBtn.hidden = false;
      downloadBtn.hidden = true;
      convertBtn.disabled = false;
      setStatus('warn', 'File ready. Click convert.');
    }

    function buildOutputName(fileName) {
      const outputExtension = currentMode().outputExtension;
      if (!/\.[^.]+$/.test(fileName || '')) {
        return 'converted.' + outputExtension;
      }
      return fileName.replace(/\.[^.]+$/, '') + '.' + outputExtension;
    }

    function getAudioContextConstructor() {
      return window.AudioContext || window.webkitAudioContext || null;
    }

    function ensureOpusRecorderSupport() {
      if (typeof MediaRecorder === 'undefined') {
        throw new Error('This browser does not support browser-native OPUS recording.');
      }

      if (typeof MediaRecorder.isTypeSupported === 'function' &&
          !MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) {
        throw new Error('This browser cannot create .opus files. Try Firefox for MP3 to OPUS conversion.');
      }
    }

    async function decodeAudioFile(file) {
      const AudioContextCtor = getAudioContextConstructor();
      if (!AudioContextCtor) {
        throw new Error('This browser does not support Web Audio decoding.');
      }

      const audioContext = new AudioContextCtor();
      try {
        setStatus('warn', 'Decoding MP3...', 15);
        const arrayBuffer = await file.arrayBuffer();
        return await audioContext.decodeAudioData(arrayBuffer.slice(0));
      } finally {
        try {
          await audioContext.close();
        } catch (e) {}
      }
    }

    async function encodeAudioBufferToOpus(audioBuffer) {
      ensureOpusRecorderSupport();

      const AudioContextCtor = getAudioContextConstructor();
      if (!AudioContextCtor) {
        throw new Error('This browser does not support Web Audio playback for OPUS encoding.');
      }

      const audioContext = new AudioContextCtor();
      const destination = audioContext.createMediaStreamDestination();
      const source = audioContext.createBufferSource();
      const chunks = [];
      let progressTimer = null;

      source.buffer = audioBuffer;
      source.connect(destination);

      return await new Promise(async (resolve, reject) => {
        let recorder;

        function cleanup() {
          if (progressTimer) {
            window.clearInterval(progressTimer);
            progressTimer = null;
          }

          try { source.disconnect(); } catch (e) {}
          try { destination.disconnect(); } catch (e) {}
          try {
            if (audioContext.state !== 'closed') {
              audioContext.close();
            }
          } catch (e) {}
        }

        try {
          recorder = new MediaRecorder(destination.stream, {
            mimeType: 'audio/ogg;codecs=opus',
            audioBitsPerSecond: 128000
          });
        } catch (error) {
          cleanup();
          reject(error);
          return;
        }

        recorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            chunks.push(event.data);
          }
        };

        recorder.onerror = (event) => {
          cleanup();
          reject(event.error || new Error('MediaRecorder failed during OPUS encoding.'));
        };

        recorder.onstop = () => {
          cleanup();
          const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
          if (!blob.size) {
            reject(new Error('Browser produced an empty .opus file.'));
            return;
          }
          resolve(blob);
        };

        source.onended = () => {
          if (recorder && recorder.state !== 'inactive') {
            recorder.stop();
          }
        };

        try {
          await audioContext.resume();
          const startedAt = performance.now();
          progressTimer = window.setInterval(() => {
            const elapsedSeconds = (performance.now() - startedAt) / 1000;
            const totalSeconds = Math.max(audioBuffer.duration, 0.1);
            const progress = 20 + Math.round(Math.min(75, (elapsedSeconds / totalSeconds) * 75));
            setStatus('warn', currentMode().progressLabel, progress);
          }, 200);

          recorder.start(250);
          source.start(0);
        } catch (error) {
          cleanup();
          reject(error);
        }
      });
    }

    function setMode(nextModeKey) {
      if (!MODES[nextModeKey] || nextModeKey === currentModeKey) {
        return;
      }

      currentModeKey = nextModeKey;
      updateModeUi();
      clearSelection('Waiting for file.');
    }

    async function ensureLoaded() {
      if (loaded) return;

      try {
        setStatus('warn', 'Loading FFmpeg core... first load can take 10-30 seconds.', 5);

        ffmpeg = new FFmpeg();
        ffmpeg.on('progress', ({ progress }) => {
          setStatus('warn', currentMode().progressLabel, Math.round(progress * 100));
        });
        ffmpeg.on('log', ({ message }) => {
          if (message && /error|failed/i.test(message)) {
            console.error(message);
          }
        });

        const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
        await ffmpeg.load({
          coreURL: await toBlobURL(baseURL + '/ffmpeg-core.js', 'text/javascript'),
          wasmURL: await toBlobURL(baseURL + '/ffmpeg-core.wasm', 'application/wasm')
        });

        loaded = true;
        setStatus('ok', 'FFmpeg loaded. Ready.');
      } catch (err) {
        console.error(err);
        setStatus('bad', 'Load failed: ' + (err && err.message ? err.message : err));
        throw err;
      }
    }

    async function convertSelectedFile() {
      if (!selectedFile) return;
      convertBtn.disabled = true;
      resultBox.hidden = true;

      try {
        let blob;

        if (currentMode().engine === 'mediaRecorder') {
          const audioBuffer = await decodeAudioFile(selectedFile);
          blob = await encodeAudioBufferToOpus(audioBuffer);
        } else {
          await ensureLoaded();

          const ext = fileExtension(selectedFile.name) || currentMode().extensions[0];
          const inputName = 'input.' + ext;
          const outputName = 'output.' + currentMode().outputExtension;

          setStatus('warn', 'Preparing file...', 10);
          await ffmpeg.writeFile(inputName, await fetchFile(selectedFile));

          setStatus('warn', currentMode().progressLabel, 15);
          await ffmpeg.exec(currentMode().buildArgs(inputName, outputName));

          const data = await ffmpeg.readFile(outputName);
          blob = new Blob([data.buffer], { type: currentMode().outputMime });

          try { await ffmpeg.deleteFile(inputName); } catch (e) {}
          try { await ffmpeg.deleteFile(outputName); } catch (e) {}
        }

      const outName = buildOutputName(selectedFile.name);
        addConvertedItem(outName, blob);
      resultText.textContent = outName + ' is ready. Size: ' + prettyBytes(blob.size);
      resultBox.hidden = false;

      setStatus('ok', 'Conversion finished.', 100);
      resetSelectionForNextFile();
      } catch (err) {
        console.error(err);
        setStatus('bad', 'Error: ' + (err && err.message ? err.message : err));
      } finally {
        convertBtn.disabled = !selectedFile;
      }
    }

    modeOpusToMp3.addEventListener('click', () => setMode('opusToMp3'));
    modeMp3ToOpus.addEventListener('click', () => setMode('mp3ToOpus'));
    fileInput.addEventListener('change', (e) => setFile(e.target.files[0] || null));
    convertBtn.addEventListener('click', convertSelectedFile);

    ['dragenter','dragover'].forEach(type => {
      dropzone.addEventListener(type, (e) => {
        e.preventDefault();
        dropzone.classList.add('drag');
      });
    });
    ['dragleave','drop'].forEach(type => {
      dropzone.addEventListener(type, (e) => {
        e.preventDefault();
        dropzone.classList.remove('drag');
      });
    });
    dropzone.addEventListener('drop', (e) => setFile(e.dataTransfer.files[0] || null));

    updateModeUi();
    clearSelection('Waiting for file.');

    window.addEventListener('beforeunload', () => {
      for (const url of archivedUrls) {
        URL.revokeObjectURL(url);
      }
    });
  </script>
</body>
</html>
